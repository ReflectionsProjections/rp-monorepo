name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      root: ${{ steps.filter.outputs.root }}
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            root:
              - '.github/workflows/**'
              - '.gitignore'
              - 'README.md'
              - 'AGENTS.md'
              - 'setup.sh'
              - 'docker-compose.yml'
              - 'dev-env.code-workspace'
              - 'scripts/**'
            api:
              - 'services/api/**'
              - '.github/workflows/**'
              - 'docker-compose.yml'
            web:
              - 'apps/web/**'
              - '.github/workflows/**'
            mobile:
              - 'apps/mobile/**'
              - '.github/workflows/**'

  root:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.root == 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Verify root scripts
        run: ./scripts/verify-root.sh

  api:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.api == 'true'
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'yarn'
          cache-dependency-path: services/api/yarn.lock
      - uses: docker/setup-buildx-action@v4
      - name: Create .env
        run: |
          cat <<EOF > ../../.env
          ENV=GITHUB_CI
          ANON_KEY=${{ secrets.ANON_KEY }}
          SERVICE_ROLE_KEY=${{ secrets.SERVICE_ROLE_KEY }}
          SUPABASE_SERVICE_KEY=${{ secrets.SERVICE_ROLE_KEY }}
          SUPABASE_URL=http://localhost:8000
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          DASHBOARD_USERNAME=${{ vars.DASHBOARD_USERNAME }}
          DASHBOARD_PASSWORD=${{ vars.DASHBOARD_PASSWORD }}
          POSTGRES_HOST=${{ vars.POSTGRES_HOST }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ vars.POSTGRES_DB }}
          POSTGRES_PORT=${{ vars.POSTGRES_PORT }}
          TYPE=service_account
          PROJECT_ID=reflections-projections
          PRIVATE_KEY_ID=${{ secrets.PRIVATE_KEY_ID }}
          PRIVATE_KEY=${{ secrets.PRIVATE_KEY }}
          CLIENT_EMAIL=${{ secrets.CLIENT_EMAIL }}
          CLIENT_ID=${{ secrets.CLIENT_ID }}
          AUTH_URI=${{ secrets.AUTH_URI }}
          TOKEN_URI=${{ secrets.TOKEN_URI }}
          AUTH_PROVIDER_X509_CERT_URL=${{ secrets.AUTH_PROVIDER_X509_CERT_URL }}
          CLIENT_X509_CERT_URL=${{ secrets.CLIENT_X509_CERT_URL }}
          UNIVERSE_DOMAIN=googleapis.com
          AWS_REGION=us-east-2
          AWS_ACCESS_KEY_ID=${{ vars.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          PGRST_DB_SCHEMAS=public
          JWT_EXPIRY=3600
          FORCE_COLOR=true
          EOF
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Build
        run: yarn build
      - name: Format
        run: yarn format:check
      - name: Lint
        run: yarn lint:check
      - name: Start local database stack
        run: docker compose -f ../../docker-compose.yml up -d db kong rest
      - name: Test
        run: yarn test
      - name: Stop local database stack
        if: always()
        run: docker compose -f ../../docker-compose.yml down -v

  web:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true'
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'yarn'
          cache-dependency-path: apps/web/yarn.lock
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: yarn install --immutable
      - name: Verify
        run: yarn verify
      - name: Format
        run: npx prettier . --check

  mobile:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'yarn'
          cache-dependency-path: apps/mobile/yarn.lock
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Verify
        run: yarn verify

  ci:
    runs-on: ubuntu-latest
    needs:
      - root
      - api
      - web
      - mobile
    if: always()
    steps:
      - name: Finalize
        run: |
          if [[ "${{ needs.root.result }}" == "failure" || "${{ needs.api.result }}" == "failure" || "${{ needs.web.result }}" == "failure" || "${{ needs.mobile.result }}" == "failure" ]]; then
            exit 1
          fi
