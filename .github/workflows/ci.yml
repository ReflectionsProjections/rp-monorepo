name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      root: ${{ steps.filter.outputs.root }}
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            root:
              - '.github/workflows/**'
              - '.gitignore'
              - 'README.md'
              - 'AGENTS.md'
              - 'setup.sh'
              - 'docker-compose.yml'
              - 'dev-env.code-workspace'
              - 'scripts/**'
            api:
              - 'services/api/**'
              - '.github/workflows/**'
              - 'docker-compose.yml'
            web:
              - 'apps/web/**'
              - '.github/workflows/**'
            mobile:
              - 'apps/mobile/**'
              - '.github/workflows/**'

  root:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.root == 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Verify root scripts
        run: ./scripts/verify-root.sh

  api:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.api == 'true'
    env:
      POSTGRES_HOST: db
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_PORT: 5432
      JWT_SECRET: ci-supabase-jwt-secret-2026-long-enough-for-tests
      JWT_EXPIRY: 3600
      PGRST_DB_SCHEMAS: public
      SUPABASE_URL: http://localhost:8000
      ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsImlhdCI6MTcwNDA2NzIwMCwiZXhwIjoyNTI0NjA4MDAwLCJyb2xlIjoiYW5vbiJ9.V56Fx5RS_LQpdttJ9BN1dnes_jr7orfFeDgAMNhpqT0
      SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsImlhdCI6MTcwNDA2NzIwMCwiZXhwIjoyNTI0NjA4MDAwLCJyb2xlIjoic2VydmljZV9yb2xlIn0.hqx87nxUtsYgFHpIDf2gLYOV6L8QTQJc3JgVmn4r_28
      SUPABASE_SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsImlhdCI6MTcwNDA2NzIwMCwiZXhwIjoyNTI0NjA4MDAwLCJyb2xlIjoic2VydmljZV9yb2xlIn0.hqx87nxUtsYgFHpIDf2gLYOV6L8QTQJc3JgVmn4r_28
      DASHBOARD_USERNAME: ci
      DASHBOARD_PASSWORD: ci
      FORCE_COLOR: true
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'yarn'
          cache-dependency-path: services/api/yarn.lock
      - uses: docker/setup-buildx-action@v4
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Build
        run: yarn build
      - name: Format
        run: yarn format:check
      - name: Lint
        run: yarn lint:check
      - name: Start local database stack
        run: docker compose -f ../../docker-compose.yml up -d db kong rest
      - name: Test
        run: yarn test
      - name: Stop local database stack
        if: always()
        run: docker compose -f ../../docker-compose.yml down -v

  web:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true'
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'yarn'
          cache-dependency-path: apps/web/yarn.lock
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: yarn install --immutable
      - name: Verify
        run: yarn verify
      - name: Format
        run: npx prettier . --check

  mobile:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'yarn'
          cache-dependency-path: apps/mobile/yarn.lock
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Verify
        run: yarn verify

  ci:
    runs-on: ubuntu-latest
    needs:
      - root
      - api
      - web
      - mobile
    if: always()
    steps:
      - name: Finalize
        run: |
          if [[ "${{ needs.root.result }}" == "failure" || "${{ needs.api.result }}" == "failure" || "${{ needs.web.result }}" == "failure" || "${{ needs.mobile.result }}" == "failure" ]]; then
            exit 1
          fi
