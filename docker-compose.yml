services:
  # External API service - uses the API repo's own docker setup
  api:
    extends:
      file: ./dev/rp-api/docker-compose.yml
      service: api

  # External Web service - uses the Web repo's own docker setup  
  web:
    extends:
      file: ./dev/rp-web/docker-compose.yml
      service: web

  mobile:
    build:
      context: ./dev/rp-mobile
      dockerfile: Dockerfile
    container_name: rp_mobile
    volumes:
      - ./dev/rp-mobile:/shared
      - rp_mobile_node_modules:/shared/node_modules
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
      - "19006:19006"
    stdin_open: true
    tty: true
    environment:
      - MOBILE_COMMAND=${MOBILE_COMMAND:-start}
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - CHOKIDAR_USEPOLLING=${CHOKIDAR_USEPOLLING:-true}
      - WATCHPACK_POLLING=${WATCHPACK_POLLING:-true}
    networks:
      - rp-network

  # Include the infrastructure services that the API depends on
  db:
    extends:
      file: ./dev/rp-api/docker-compose.yml
      service: db

  studio:
    extends:
      file: ./dev/rp-api/docker-compose.yml
      service: studio

  kong:
    extends:
      file: ./dev/rp-api/docker-compose.yml
      service: kong

  rest:
    extends:
      file: ./dev/rp-api/docker-compose.yml
      service: rest

  meta:
    extends:
      file: ./dev/rp-api/docker-compose.yml
      service: meta

networks:
  rp-network:
    driver: bridge

volumes:
  rp_mobile_node_modules:
